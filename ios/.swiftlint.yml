# SwiftLint Configuration for GHISA
# Install: Add SwiftLintBuildToolPlugin via SPM, or `brew install swiftlint` (requires Xcode)

included:
  - GHISA

excluded:
  - GHISA/.build
  - GHISA/DerivedData

# Rules
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - modifier_order
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - trailing_comma
  - todo
  - switch_case_alignment

# Configuration
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 80

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - n
    - r
    - g
    - b
    - a

nesting:
  type_level: 2
  function_level: 3

reporter: xcode

# Custom rules — enforce project constraints from CLAUDE.md
custom_rules:
  no_uikit:
    name: "No UIKit"
    regex: "import UIKit"
    message: "Use SwiftUI only — UIKit is not allowed in this project."
    severity: error

  no_combine:
    name: "No Combine"
    regex: "import Combine"
    message: "Use async/await and @Observable instead of Combine."
    severity: warning

  no_observable_object:
    name: "No ObservableObject"
    regex: "ObservableObject"
    message: "Use @Observable macro instead of ObservableObject (iOS 17+)."
    severity: warning
