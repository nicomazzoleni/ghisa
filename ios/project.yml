name: GHISA
options:
  bundleIdPrefix: com.ghisa
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  defaultConfig: Debug
settings:
  base:
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
targets:
  GHISA:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GHISA
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        PRODUCT_BUNDLE_IDENTIFIER: com.ghisa.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSHealthShareUsageDescription: "GHISA uses your health data to show how lifestyle factors affect your training performance."
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: GHISA/GHISA.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    postCompileScripts:
      - script: |
          if which swiftformat >/dev/null; then
            swiftformat "$SRCROOT/GHISA" --config "$SRCROOT/.swiftformat" 2>/dev/null || true
          fi
        name: SwiftFormat
        basedOnDependencyAnalysis: false
      - script: |
          if which swiftlint >/dev/null; then
            swiftlint lint --config "$SRCROOT/.swiftlint.yml" "$SRCROOT/GHISA" 2>/dev/null || true
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
  GHISATests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GHISATests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: GHISA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghisa.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GHISA.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GHISA"
        BUNDLE_LOADER: "$(TEST_HOST)"
